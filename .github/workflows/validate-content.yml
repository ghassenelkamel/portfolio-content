name: validate-content

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install validators
        run: npm install -g ajv-cli ajv-formats

      - name: Validate about
        run: ajv validate --spec=draft2020 -c ajv-formats -s schemas/about.schema.json -d content/about.json

      - name: Validate skills
        run: ajv validate --spec=draft2020 -c ajv-formats -s schemas/skills.schema.json -d content/skills.json

      - name: Validate experience
        run: ajv validate --spec=draft2020 -c ajv-formats -s schemas/experience.schema.json -d content/experience.json

      - name: Validate contact
        run: ajv validate --spec=draft2020 -c ajv-formats -s schemas/contact.schema.json -d content/contact.json
